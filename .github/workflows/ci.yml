# Manual CI — trigger via GitHub UI → Actions → CI → Run workflow.
# Not triggered automatically on push or pull_request (by design).
name: CI

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to test
        required: false
        default: develop

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - name: Ruff
        working-directory: apps/api
        run: uv run ruff check .
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo lint

  type-check:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - name: mypy
        working-directory: apps/api
        run: |
          uv sync
          uv run mypy app
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo type-check

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pulse
          POSTGRES_PASSWORD: pulse_test
          POSTGRES_DB: pulse_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - name: pytest
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+asyncpg://pulse:pulse_test@localhost:5432/pulse_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-not-used-in-production
          QUIVER_URL: http://localhost:8080
          QUIVER_API_KEY: test-key
          ENVIRONMENT: test
        run: |
          uv sync
          uv run pytest -v --tb=short
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo test

  build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Build images
        run: docker compose build --no-cache api web
