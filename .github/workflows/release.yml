# Manual release — trigger via GitHub UI → Actions → Release → Run workflow.
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer tag (e.g. v1.0.0)"
        required: true
        type: string

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ inputs.version }} \
            --title "Pulse ${{ inputs.version }}" \
            --generate-notes \
            docker-compose.yml \
            .env.example
